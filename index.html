<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="index.css"/>
  <link rel="stylesheet" href="zoomBingo.css"/>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Bingo</title>
</head>
<body class="container">
  <section class="sidebar">
    <section class="controls">
      <div class="space-input-row">
        <input id="space-input" type="text" placeholder="add custom square"/>
        <button id="add">Add</button>
      </div>
      <div class="buttons-row">
        <button id="reset">Reset List</button>
        <button id="makeCard">New Card</button>
      </div>
    </section>
    <section id="options-list"></section>
  </section>
  <section id="preview" class="card-container"></section>
  <script src="./components/BingoGame.js"></script>
  <script src="./components/Card.js"></script>
  <script src="./components/Square.js"></script>
  <script src="spaces.js"></script>
  <script src="helpers.js"></script>
  <script src="querySelectors.js"></script>
  <script src="zoomBingo.js"></script>
</body>
</html>
